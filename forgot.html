<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 — 思想引领，砥砺前行</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <style>
        .forgot-container {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .forgot-card {
            max-width: 480px;
            width: 100%;
            background: linear-gradient(135deg, #fff5f5, #fde7e7);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(196, 18, 48, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .forgot-card::before {
            content: "🔐";
            position: absolute;
            top: -30px;
            right: -30px;
            font-size: 200px;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }
        
        .forgot-title {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            color: #c41230;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .forgot-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(196, 18, 48, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #999;
            transition: all 0.3s;
        }
        
        .step.active {
            background: linear-gradient(135deg, #c41230, #e53e3e);
            color: white;
            box-shadow: 0 4px 12px rgba(196, 18, 48, 0.4);
            transform: scale(1.1);
        }
        
        .step.completed {
            background: #4caf50;
            color: white;
        }
        
        .form-step {
            display: none;
        }
        
        .form-step.active {
            display: block;
            animation: fadeIn 0.4s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #c41230;
            box-shadow: 0 0 0 3px rgba(196, 18, 48, 0.1);
        }
        
        .input-field.error {
            border-color: #f44336;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #c41230, #e53e3e);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(196, 18, 48, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        
        .message.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }
        
        .message.error {
            background: #ffebee;
            color: #c41230;
            border-left: 4px solid #f44336;
        }
        
        .message.info {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #2196f3;
        }
        
        .tip-box {
            background: rgba(255, 193, 7, 0.1);
            border-left: 4px solid #ff9800;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }
        
        .success-icon {
            font-size: 64px;
            text-align: center;
            margin-bottom: 20px;
            animation: bounce 1s ease-in-out;
        }
        
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>
    <div class="forgot-container">
        <div class="forgot-card">
            <h1 class="forgot-title">
                <span>🔐</span>
                <span>找回密码</span>
            </h1>
            <p class="forgot-subtitle">通过注册账号验证来重置您的密码</p>

            <!-- 步骤指示器 -->
            <div class="step-indicator">
                <div class="step active" id="step1">1</div>
                <div class="step" id="step2">2</div>
                <div class="step" id="step3">3</div>
            </div>

            <form id="forgot-form" novalidate>
                <!-- 步骤1：输入账号 -->
                <div class="form-step active" id="form-step-1">
                    <div class="input-group">
                        <label class="input-label" for="reset-account">📧 注册账号</label>
                        <input id="reset-account" name="account" type="text" class="input-field" placeholder="请输入您的注册账号" autocomplete="username" required>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn btn-secondary" onclick="location.href='login.html'">
                            <span>←</span>
                            <span>返回登录</span>
                        </button>
                        <button type="button" class="btn btn-primary" id="step1Btn">
                            <span>下一步</span>
                            <span>→</span>
                        </button>
                    </div>
                    <div class="message" id="message1"></div>
                </div>

                <!-- 步骤2：验证身份（输入旧密码或安全问题） -->
                <div class="form-step" id="form-step-2">
                    <div class="input-group">
                        <label class="input-label" for="verify-password">🔑 验证身份</label>
                        <input id="verify-password" name="oldPassword" type="password" class="input-field" placeholder="请输入旧密码进行验证" autocomplete="current-password">
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn btn-secondary" id="backToStep1">
                            <span>←</span>
                            <span>上一步</span>
                        </button>
                        <button type="button" class="btn btn-primary" id="step2Btn">
                            <span>验证</span>
                            <span>→</span>
                        </button>
                    </div>
                    <div class="message" id="message2"></div>
                    <div class="tip-box">
                        💡 提示：为了保护您的账户安全，请输入旧密码进行身份验证
                    </div>
                </div>

                <!-- 步骤3：设置新密码 -->
                <div class="form-step" id="form-step-3">
                    <div class="input-group">
                        <label class="input-label" for="new-password">🔒 新密码</label>
                        <input id="new-password" name="newPassword" type="password" class="input-field" placeholder="请输入新密码（至少6位）" autocomplete="new-password">
                    </div>
                    <div class="input-group">
                        <label class="input-label" for="confirm-password">✅ 确认密码</label>
                        <input id="confirm-password" name="confirmPassword" type="password" class="input-field" placeholder="请再次输入新密码" autocomplete="new-password">
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn btn-secondary" id="backToStep2">
                            <span>←</span>
                            <span>上一步</span>
                        </button>
                        <button type="button" class="btn btn-primary" id="resetBtn">
                            <span>✓</span>
                            <span>重置密码</span>
                        </button>
                    </div>
                    <div class="message" id="message3"></div>
                </div>

                <!-- 步骤4：成功提示 -->
                <div class="form-step" id="form-step-success">
                    <div class="success-icon">✅</div>
                    <div style="text-align: center; margin-bottom: 20px;">
                        <h3 style="color: #4caf50; margin-bottom: 10px;">密码重置成功！</h3>
                        <p style="color: #666; font-size: 14px;">您的密码已成功更新，请使用新密码登录</p>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="location.href='login.html'" style="width: 100%;">
                        <span>前往登录</span>
                        <span>→</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <footer class="site-footer">
        <div class="wrap">© 2025 思想引领，砥砺前行</div>
    </footer>

    <script src="main.js"></script>
    <script src="forgot.js?v=3.0"></script>
</body>

</html>
