<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 思想引领，砥砺前行</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="site-header">
        <div class="wrap">
            <h1>🏛️ 个人中心</h1>
            <nav class="main-nav">
                <a href="index.html">主页</a>
                <a href="ai.html">智能问答</a>
                <a href="knowledge.html">知识分享</a>
                <a href="culture.html">文化传播</a>
                <a href="discuss.html">讨论区</a>
                <a href="tower_defense.html">三大法宝</a>
                <a href="models.html">3D展馆</a>
                <a href="challenge.html" class="nav-challenge">🎯 互动学习</a>
                <a href="history_today.html" class="nav-history">📅 历史上的今天</a>
                <a href="contest.html" class="nav-contest">🏆 创作竞赛</a>
                <a href="contest_works.html">📚 作品展示</a>
                <a href="profile.html" class="nav-profile active">👤 个人中心</a>
            </nav>
        </div>
    </header>

    <div class="user-bar" id="userBar"></div>

    <div class="wrap" style="max-width:1200px;">
        <!-- 个人信息卡片 -->
        <div class="card" style="margin-top:20px;text-align:center;padding:40px;background:linear-gradient(135deg,#fff5f5,#fde7e7);position:relative;overflow:hidden;">
            <div style="position:absolute;top:-20px;right:-20px;font-size:150px;opacity:0.1;">🎯</div>
            <div style="width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,#c41230,#e53e3e);margin:0 auto 20px;font-size:70px;color:white;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(196,18,48,0.3);border:5px solid white;">
                <span id="user-avatar">👤</span>
            </div>
            <div style="font-size:36px;font-weight:bold;margin-bottom:10px;" id="user-name">游客</div>
            <div style="font-size:18px;color:#666;background:rgba(196,18,48,0.1);padding:5px 20px;border-radius:20px;display:inline-block;" id="user-role">普通用户</div>
        </div>

        <!-- 数据总览 -->
        <div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin:30px 0;">
            <div class="stat-card card" style="border-left:4px solid #4caf50;">
                <div style="font-size:48px;margin-bottom:10px;">💬</div>
                <div style="font-size:14px;color:#666;margin-bottom:8px;">讨论发帖</div>
                <div style="font-size:32px;font-weight:bold;color:#4caf50;" id="discuss-posts">0</div>
            </div>
            <div class="stat-card card" style="border-left:4px solid #673ab7;">
                <div style="font-size:48px;margin-bottom:10px;">✍️</div>
                <div style="font-size:14px;color:#666;margin-bottom:8px;">竞赛作品</div>
                <div style="font-size:32px;font-weight:bold;color:#673ab7;" id="contest-works">0</div>
            </div>
            <div class="stat-card card" style="border-left:4px solid #ff9800;">
                <div style="font-size:48px;margin-bottom:10px;">🎮</div>
                <div style="font-size:14px;color:#666;margin-bottom:8px;">游戏局数</div>
                <div style="font-size:32px;font-weight:bold;color:#ff9800;" id="games-played">0</div>
            </div>
            <div class="stat-card card" style="border-left:4px solid #f44336;">
                <div style="font-size:48px;margin-bottom:10px;">🎯</div>
                <div style="font-size:14px;color:#666;margin-bottom:8px;">答题得分</div>
                <div style="font-size:32px;font-weight:bold;color:#f44336;" id="quiz-score">0</div>
            </div>
        </div>

        <!-- 标签页 -->
        <div class="card" style="padding:20px;">
            <div style="display:flex;gap:10px;border-bottom:2px solid #eee;margin-bottom:30px;flex-wrap:wrap;">
                <button class="tab-btn active" data-tab="game" style="padding:12px 24px;background:transparent;border:none;border-bottom:3px solid #c41230;cursor:pointer;font-size:16px;font-weight:600;color:#c41230;">
                    🎮 游戏战绩
                </button>
                <button class="tab-btn" data-tab="discuss" style="padding:12px 24px;background:transparent;border:none;border-bottom:3px solid transparent;cursor:pointer;font-size:16px;font-weight:600;color:#666;">
                    💬 讨论动态
                </button>
                <button class="tab-btn" data-tab="contest" style="padding:12px 24px;background:transparent;border:none;border-bottom:3px solid transparent;cursor:pointer;font-size:16px;font-weight:600;color:#666;">
                    ✍️ 创作记录
                </button>
                <button class="tab-btn" data-tab="challenge" style="padding:12px 24px;background:transparent;border:none;border-bottom:3px solid transparent;cursor:pointer;font-size:16px;font-weight:600;color:#666;">
                    📝 答题排行
                </button>
                <button class="tab-btn" data-tab="guestbook" style="padding:12px 24px;background:transparent;border:none;border-bottom:3px solid transparent;cursor:pointer;font-size:16px;font-weight:600;color:#666;">
                    📝 我的留言
                </button>
            </div>

            <!-- 游戏战绩标签 -->
            <div class="tab-content active" id="tab-game">
                <div id="game-stats"></div>
            </div>

            <!-- 讨论动态标签 -->
            <div class="tab-content" id="tab-discuss" style="display:none;">
                <div id="discuss-activity"></div>
            </div>

            <!-- 创作记录标签 -->
            <div class="tab-content" id="tab-contest" style="display:none;">
                <div id="contest-activity"></div>
            </div>

            <!-- 答题排行标签 -->
            <div class="tab-content" id="tab-challenge" style="display:none;">
                <div id="challenge-stats"></div>
            </div>

            <!-- 我的留言标签 -->
            <div class="tab-content" id="tab-guestbook" style="display:none;">
                <!-- 留言表单 -->
                <div style="background:#f9f9f9;padding:20px;border-radius:12px;margin-bottom:30px;">
                    <h3 style="margin:0 0 20px 0;color:#c41230;font-size:20px;">✒️ 发表留言</h3>
                    <form id="messageForm">
                        <div style="margin-bottom:15px;">
                            <label style="display:block;font-weight:600;margin-bottom:8px;color:#333;">留言标题 *</label>
                            <input type="text" id="messageTitle" placeholder="请输入留言标题（最多50字）" maxlength="50" required style="width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;box-sizing:border-box;">
                        </div>
                        <div style="margin-bottom:15px;">
                            <label style="display:block;font-weight:600;margin-bottom:8px;color:#333;">留言内容 *</label>
                            <textarea id="messageContent" placeholder="请输入留言内容（最多500字）" maxlength="500" required style="width:100%;min-height:120px;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;resize:vertical;box-sizing:border-box;font-family:inherit;"></textarea>
                            <div style="text-align:right;font-size:12px;color:#999;margin-top:5px;">
                                <span id="charCount">0</span> / 500
                            </div>
                        </div>
                        <button type="submit" id="submitBtn" style="background:linear-gradient(135deg,#c41230,#e53e3e);color:white;border:none;padding:12px 30px;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;">
                            📮 提交留言
                        </button>
                    </form>
                </div>

                <!-- 留言列表 -->
                <div id="userMessageSection">
                    <div style="padding:20px;background:rgba(196,18,48,0.05);border-radius:12px;text-align:center;">
                        <p style="margin:0;color:#666;font-size:15px;line-height:1.8;">💡 感谢您的留言！您的宝贵意见将提交给管理员审阅。</p>
                    </div>
                </div>

                <!-- 管理员留言管理（仅管理员可见） -->
                <div id="adminGuestbookSection" style="display:none;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding:20px 0;border-top:2px solid #eee;">
                        <h3 style="margin:0;color:#333;font-size:20px;">🛡️ 用户留言管理</h3>
                        <div style="background:#ff9800;color:white;padding:6px 16px;border-radius:20px;font-size:14px;font-weight:600;">
                            共 <span id="allMessageCount">0</span> 条留言
                        </div>
                    </div>
                    <div id="allMessagesList">
                        <div style="text-align:center;padding:40px;color:#999;">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="wrap">© 2025 思想引领，砥砺前行</div>
    </footer>

    <script src="main.js"></script>
    <script>
        // 标签页切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.style.borderBottom = '3px solid transparent';
                    b.style.color = '#666';
                });
                btn.style.borderBottom = '3px solid #c41230';
                btn.style.color = '#c41230';

                document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
                document.getElementById('tab-' + tab).style.display = 'block';
            });
        });

        // 加载用户信息
        function loadUserProfile() {
            const userName = localStorage.getItem('login_user') || '游客';
            const userRole = localStorage.getItem('login_role') || 'user';
            document.getElementById('user-name').textContent = userName;
            document.getElementById('user-role').textContent = userRole === 'admin' ? '管理员' : '普通用户';
            document.getElementById('user-avatar').textContent = userName.charAt(0).toUpperCase();
        }

        // 加载讨论区数据
        function loadDiscussData() {
            const posts = JSON.parse(localStorage.getItem('forum_posts_v1') || '[]');
            const userName = localStorage.getItem('login_user') || '游客';
            const myPosts = posts.filter(p => p.author === userName);
            document.getElementById('discuss-posts').textContent = myPosts.length;

            const container = document.getElementById('discuss-activity');
            if (myPosts.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">暂无讨论记录</div>';
            } else {
                container.innerHTML = myPosts.slice(0, 5).map(p => `
                    <div style="background:rgba(196,18,48,0.05);padding:15px;border-radius:8px;margin-bottom:10px;">
                        <div style="font-weight:600;margin-bottom:5px;">${p.content.substring(0, 50)}...</div>
                        <div style="font-size:12px;color:#999;">${new Date(p.timestamp).toLocaleString()}</div>
                    </div>
                `).join('');
            }
        }

        // 加载竞赛数据
        async function loadContestData() {
            const userName = localStorage.getItem('login_user') || '游客';

            try {
                // 从服务器加载用户的投稿作品
                const response = await fetch(`/api/submissions?userId=${encodeURIComponent(userName)}`);
                const data = await response.json();

                if (data.ok && data.submissions) {
                    const myWorks = data.submissions.filter(s => s.status === 'published');
                    document.getElementById('contest-works').textContent = myWorks.length;

                    const container = document.getElementById('contest-activity');
                    if (myWorks.length === 0) {
                        container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">暂无竞赛作品</div>';
                    } else {
                        container.innerHTML = myWorks.slice(0, 5).map(w => {
                            const date = new Date(w.createdAt).toLocaleString('zh-CN', {
                                year: 'numeric',
                                month: '2-digit',
                                day: '2-digit',
                                hour: '2-digit',
                                minute: '2-digit'
                            });
                            return `
                                <div style="background:rgba(198,40,40,0.05);padding:15px;border-radius:8px;margin-bottom:10px;cursor:pointer;transition:all 0.3s;" 
                                     onmouseover="this.style.background='rgba(196,18,48,0.1)'"
                                     onmouseout="this.style.background='rgba(196,18,48,0.05)'"
                                     onclick="location.href='contest_works.html?id=${w.id}'">
                                    <div style="display:flex;justify-content:space-between;align-items:start;">
                                        <div style="flex:1;">
                                            <div style="font-weight:600;margin-bottom:5px;font-size:16px;">${w.title}</div>
                                            <div style="font-size:12px;color:#999;margin-bottom:8px;">${date}</div>
                                            <div style="display:flex;gap:15px;font-size:13px;color:#666;">
                                                <span>👍 ${w.votes || 0} 投票</span>
                                                <span>👁️ ${w.views || 0} 浏览</span>
                                                ${w.featured ? '<span style="color:#ffd700;">⭐ 精选</span>' : ''}
                                            </div>
                                        </div>
                                        <div style="background:rgba(196,18,48,0.1);padding:4px 12px;border-radius:12px;font-size:12px;color:#c41230;">
                                            ${w.category || '文章'}
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('');
                    }
                } else {
                    document.getElementById('contest-works').textContent = '0';
                    document.getElementById('contest-activity').innerHTML = '<div style="text-align:center;padding:40px;color:#999;">暂无竞赛作品</div>';
                }
            } catch (error) {
                console.error('加载竞赛数据失败:', error);
                document.getElementById('contest-works').textContent = '0';
                document.getElementById('contest-activity').innerHTML = '<div style="text-align:center;padding:40px;color:#f44336;">加载失败，请刷新页面重试</div>';
            }
        }

        // 加载游戏数据
        function loadGameData() {
            const stats = JSON.parse(localStorage.getItem('gameStats') || '{"gamesPlayed":0,"totalScore":0}');
            document.getElementById('games-played').textContent = stats.gamesPlayed || 0;

            const container = document.getElementById('game-stats');
            container.innerHTML = `
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;">
                    <div style="background:rgba(196,18,48,0.05);padding:20px;border-radius:8px;border-left:4px solid #c41230;">
                        <div style="font-size:14px;color:#666;">总局数</div>
                        <div style="font-size:28px;font-weight:bold;color:#c41230;">${stats.gamesPlayed || 0}</div>
                    </div>
                    <div style="background:rgba(196,18,48,0.05);padding:20px;border-radius:8px;border-left:4px solid #c41230;">
                        <div style="font-size:14px;color:#666;">累计得分</div>
                        <div style="font-size:28px;font-weight:bold;color:#c41230;">${stats.totalScore || 0}</div>
                    </div>
                </div>
            `;
        }

        // 加载答题数据
        function loadChallengeData() {
            const userName = localStorage.getItem('login_user') || '游客';
            const rankings = JSON.parse(localStorage.getItem('quiz_rankings') || '[]');
            const userRankings = rankings.filter(r => r.name === userName).sort((a, b) => b.score - a.score);

            const bestScore = userRankings.length > 0 ? userRankings[0].score : 0;
            document.getElementById('quiz-score').textContent = bestScore;

            const container = document.getElementById('challenge-stats');
            if (userRankings.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">暂无答题记录</div>';
            } else {
                container.innerHTML = userRankings.slice(0, 5).map((r, i) => `
                    <div style="background:rgba(196,18,48,0.05);padding:15px;border-radius:8px;margin-bottom:10px;display:flex;justify-content:space-between;">
                        <div>
                            <div style="font-weight:600;">第 ${i + 1} 次答题</div>
                            <div style="font-size:12px;color:#999;">答对 ${r.correct}/${r.total} 题</div>
                        </div>
                        <div style="font-size:24px;font-weight:bold;color:#c41230;">${r.score}分</div>
                    </div>
                `).join('');
            }
        }

        // ===== 留言箱功能 =====
        let allMessages = [];
        let isSubmitting = false;

        // 字符计数
        function updateCharCount() {
            const content = document.getElementById('messageContent');
            const counter = document.getElementById('charCount');
            if (content && counter) {
                counter.textContent = content.value.length;
                counter.style.color = content.value.length > 450 ? '#f44336' : '#999';
            }
        }

        // 初始化留言箱显示（根据角色）
        async function initGuestbook() {
            const userRole = localStorage.getItem('login_role');

            if (userRole === 'admin') {
                // 管理员：显示管理区域，隐藏普通用户提示
                document.getElementById('userMessageSection').style.display = 'none';
                document.getElementById('adminGuestbookSection').style.display = 'block';
                await loadAllMessages();
            } else {
                // 普通用户：显示提示，隐藏管理区域
                document.getElementById('userMessageSection').style.display = 'block';
                document.getElementById('adminGuestbookSection').style.display = 'none';
            }
        }

        // 加载所有留言（仅管理员）
        async function loadAllMessages() {
            try {
                const response = await fetch('/api/guestbook/list');
                const data = await response.json();

                if (data.ok) {
                    allMessages = data.messages || [];
                    renderAllMessages();
                }
            } catch (error) {
                console.error('加载留言失败:', error);
                document.getElementById('allMessagesList').innerHTML = '<div style="text-align:center;padding:40px;color:#f44336;">加载失败，请刷新页面重试</div>';
            }
        }

        // 渲染所有留言（仅管理员）
        function renderAllMessages() {
            const container = document.getElementById('allMessagesList');
            const counter = document.getElementById('allMessageCount');

            counter.textContent = allMessages.length;

            if (allMessages.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">💭 暂无用户留言</div>';
                return;
            }

            container.innerHTML = allMessages.map(msg => {
                const isAdmin = msg.role === 'admin';
                return `
                    <div style="background:#fff;border:2px solid #f0f0f0;border-radius:12px;padding:20px;margin-bottom:15px;transition:all 0.3s;position:relative;"
                         onmouseover="this.style.borderColor='#c41230';this.style.boxShadow='0 4px 12px rgba(196,18,48,0.1)'"
                         onmouseout="this.style.borderColor='#f0f0f0';this.style.boxShadow='none'">
                        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:15px;">
                            <div style="flex:1;">
                                <div style="font-size:18px;font-weight:bold;color:#333;margin-bottom:8px;">${escapeHtml(msg.title)}</div>
                                <div style="display:flex;gap:15px;font-size:13px;color:#666;flex-wrap:wrap;">
                                    <span>👤 <span style="background:${isAdmin ? 'linear-gradient(135deg,#ff9800,#fb8c00)' : 'linear-gradient(135deg,#c41230,#e53e3e)'};color:white;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:bold;">${escapeHtml(msg.author)}</span></span>
                                    <span>🕒 ${formatTime(msg.createdAt)}</span>
                                </div>
                            </div>
                            <button onclick="deleteAdminMessage('${msg.id}')" 
                                    style="background:#f44336;color:white;border:none;padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer;transition:all 0.3s;"
                                    onmouseover="this.style.background='#d32f2f'"
                                    onmouseout="this.style.background='#f44336'">
                                🗑️ 删除
                            </button>
                        </div>
                        <div style="color:#555;line-height:1.8;white-space:pre-wrap;word-wrap:break-word;background:rgba(0,0,0,0.02);padding:15px;border-radius:8px;">${escapeHtml(msg.content)}</div>
                    </div>
                `;
            }).join('');
        }

        // 提交留言
        async function submitMessage(e) {
            e.preventDefault();

            if (isSubmitting) return;

            const title = document.getElementById('messageTitle').value.trim();
            const content = document.getElementById('messageContent').value.trim();
            const userName = localStorage.getItem('login_user');
            const userRole = localStorage.getItem('login_role');

            if (!title || !content) {
                alert('请填写完整的留言信息！');
                return;
            }

            isSubmitting = true;
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';

            try {
                const response = await fetch('/api/guestbook/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title,
                        content,
                        author: userName,
                        role: userRole
                    })
                });

                const data = await response.json();

                if (data.ok) {
                    alert('✅ 留言发表成功！感谢您的宝贵意见！');
                    document.getElementById('messageTitle').value = '';
                    document.getElementById('messageContent').value = '';
                    updateCharCount();

                    // 如果是管理员，重新加载留言列表
                    if (userRole === 'admin') {
                        await loadAllMessages();
                    }
                } else {
                    alert('❌ 提交失败：' + (data.error || '未知错误'));
                }
            } catch (error) {
                console.error('提交留言失败:', error);
                alert('❌ 提交失败：网络错误或服务器异常');
            } finally {
                isSubmitting = false;
                submitBtn.disabled = false;
                submitBtn.textContent = '📮 提交留言';
            }
        }

        // 管理员删除留言
        window.deleteAdminMessage = async function(messageId) {
            if (!confirm('确定要删除这条留言吗？')) return;

            const userName = localStorage.getItem('login_user');
            const userRole = localStorage.getItem('login_role');

            if (userRole !== 'admin') {
                alert('您没有权限删除留言！');
                return;
            }

            try {
                const response = await fetch(`/api/guestbook/delete/${messageId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user: userName,
                        role: userRole
                    })
                });

                const data = await response.json();

                if (data.ok) {
                    alert('✅ 删除成功！');
                    await loadAllMessages();
                } else {
                    alert('❌ 删除失败：' + (data.error || '未知错误'));
                }
            } catch (error) {
                console.error('删除留言失败:', error);
                alert('❌ 删除失败：网络错误或服务器异常');
            }
        };

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 时间格式化
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)}天前`;

            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 页面加载
        window.addEventListener('load', () => {
            loadUserProfile();
            loadDiscussData();
            loadContestData();
            loadGameData();
            loadChallengeData();

            // 绑定留言表单事件
            const messageForm = document.getElementById('messageForm');
            const messageContent = document.getElementById('messageContent');

            if (messageForm) {
                messageForm.addEventListener('submit', submitMessage);
            }

            if (messageContent) {
                messageContent.addEventListener('input', updateCharCount);
            }

            // 初始化留言箱（根据用户角色）
            initGuestbook();
        });
    </script>
</body>

</html>
